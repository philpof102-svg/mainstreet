name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node --version
      - name: Run oracle tests
        run: node --test test/oracle.test.js
      - name: Run example
        run: node examples/basic-usage.js
